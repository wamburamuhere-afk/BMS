; ============================================================================
;  BMS — Per-application PHP runtime limits (for PHP-FPM / CGI environments)
; ============================================================================
;
;  Apache mod_php hosts pick up the equivalent <IfModule> block in .htaccess
;  and ignore this file. PHP-FPM and CGI hosts read THIS file once every 5
;  minutes (the default user_ini.cache_ttl). Both paths land at the same
;  effective limits, so deployment behavior is identical regardless of how
;  the server runs PHP.
;
;  Driver: the Backup & Restore page handles full database dumps (.sql)
;  that already exceed PHP's 2 MB upload default and will keep growing as
;  the customer base grows. The limits below give years of headroom.
;
;  Security notes:
;  - Direct HTTP access to this file is blocked by .htaccess (FilesMatch).
;  - Upload directories disable PHP execution (Options -ExecCGI) so an
;    attacker who somehow wrote a .user.ini into uploads/ cannot have it
;    take effect on a request.
;  - Apache LimitRequestBody (in .htaccess) caps the body at 100 MB at the
;    Apache layer, so even if PHP were bypassed, oversized requests die
;    before PHP allocates memory.
;
;  Adjust upward only if a real customer DB outgrows 100 MB.
; ============================================================================

upload_max_filesize = 100M
post_max_size       = 100M
memory_limit        = 256M
max_execution_time  = 300
max_input_time      = 300
