name: Deploy to Production
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          script: |
            cd /var/www/mwpt.bjptechnologies.co.tz/public_html && git reset --hard HEAD && git pull origin main && php migrations/runner.php; mkdir -p uploads/purchase_orders || true; chmod 777 uploads/purchase_orders || true; mkdir -p uploads/document_library || true; chmod 777 uploads/document_library || true; mkdir -p uploads/documents || true; chmod 777 uploads/documents || true
            cd /var/www/mufindipower.bjptechnologies.co.tz/public_html && git reset --hard HEAD && git pull origin main && php migrations/runner.php; mkdir -p uploads/purchase_orders || true; chmod 777 uploads/purchase_orders || true; mkdir -p uploads/document_library || true; chmod 777 uploads/document_library || true; mkdir -p uploads/documents || true; chmod 777 uploads/documents || true
            cd /var/www/bms.bjptechnologies.co.tz/public_html && git reset --hard HEAD && git pull origin main && php migrations/runner.php; mkdir -p uploads/purchase_orders || true; chmod 777 uploads/purchase_orders || true; mkdir -p uploads/document_library || true; chmod 777 uploads/document_library || true; mkdir -p uploads/documents || true; chmod 777 uploads/documents || true
            cd /var/www/demo.bejundas.co.tz/public_html && git reset --hard HEAD && git pull origin main && php migrations/runner.php; mkdir -p uploads/purchase_orders || true; chmod 777 uploads/purchase_orders || true; mkdir -p uploads/document_library || true; chmod 777 uploads/document_library || true; mkdir -p uploads/documents || true; chmod 777 uploads/documents || true
