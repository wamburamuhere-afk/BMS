name: Deploy to Production
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/mwpt.bjptechnologies.co.tz/public_html && git pull origin main
            cd /var/www/mufindipower.bjptechnologies.co.tz/public_html && git pull origin main
            cd /var/www/bms.bjptechnologies.co.tz/public_html && git pull origin main
            cd /var/www/demo.bejundas.co.tz/public_html && git pull origin main
            echo "BMS deployed at $(date)"
            echo "Deploy check: OK"
