name: Test & Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  # ── JOB 1: TEST ─────────────────────────────────────────────────────────────
  # Runs on every push to main. If any step fails, deploy is blocked.
  test:
    name: PHP Syntax & Structure Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify PHP available
        run: php --version

      - name: PHP syntax check — all app & api files
        run: |
          echo "Running PHP lint on all source files..."
          ERRORS=0
          while IFS= read -r file; do
            OUTPUT=$(php -l "$file" 2>&1)
            if echo "$OUTPUT" | grep -qE "^(Parse error|Fatal error)"; then
              echo "❌  $file"
              echo "    $OUTPUT"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(find . -name "*.php" \
            -not -path "./scratch/*" \
            -not -path "./vendor/*" \
            -not -path "./TCPDF/*" \
            -not -path "./.git/*")
          if [ "$ERRORS" -gt 0 ]; then
            echo ""
            echo "❌ $ERRORS PHP file(s) have syntax errors — deploy blocked."
            exit 1
          fi
          echo "✓ All PHP files passed syntax check."

      - name: Check critical API files exist
        run: |
          echo "Checking critical files exist..."
          MISSING=0
          FILES=(
            "roots.php"
            "helpers.php"
            "api/create_dn.php"
            "api/update_dn.php"
            "api/get_delivery_notes_list.php"
            "api/get_project_warehouse_stock.php"
            "app/bms/grn/dn_create.php"
            "app/bms/grn/delivery_notes.php"
            "app/bms/operations/project_view.php"
            "app/bms/operations/sub_contractor_details.php"
            "api/finance/get_expense_schema.php"
            "api/finance/manage_expense_schema.php"
            "app/constant/accounts/expenses.php"
            "api/customer/add_lpo.php"
            "api/customer/update_lpo.php"
            "api/customer/delete_lpo.php"
            "api/customer/get_lpo.php"
            "api/customer/get_lpos_list.php"
            "api/customer/change_lpo_status.php"
            "migrations/2026_05_20_create_customer_lpos.php"
            "migrations/2026_05_20_lpo_status_workflow.php"
            "migrations/2026_05_20_create_lpo_items.php"
            "migrations/2026_05_20_create_lpo_attachments.php"
            "api/customer/delete_lpo_attachment.php"
            "app/bms/invoice/po_invoice_report.php"
            "api/po_invoice_report.php"
            "app/constant/document/e_signatures.php"
            "api/get_user_signatures.php"
            "api/get_pending_signatures.php"
            "api/get_signature_history.php"
            "api/document/upload_signature.php"
            "api/document/delete_signature.php"
            "api/document/apply_signature.php"
            "api/document/get_user_signatures_list.php"
            "ajax/save_drawn_signature.php"
            "migrations/2026_05_21_create_document_signatures.php"
            "migrations/2026_05_26_create_workflow_signatures.php"
            "tests/test_esignatures_cli.php"
          )
          for f in "${FILES[@]}"; do
            if [ ! -f "$f" ]; then
              echo "❌ MISSING: $f"
              MISSING=$((MISSING + 1))
            else
              echo "✓  $f"
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo ""
            echo "❌ $MISSING critical file(s) missing — deploy blocked."
            exit 1
          fi
          echo "✓ All critical files present."

      - name: Check migration files are valid PHP
        run: |
          echo "Checking migration files..."
          ERRORS=0
          for f in migrations/*.php; do
            [ -f "$f" ] || continue
            OUTPUT=$(php -l "$f" 2>&1)
            if echo "$OUTPUT" | grep -qE "^(Parse error|Fatal error)"; then
              echo "❌  $f — $OUTPUT"
              ERRORS=$((ERRORS + 1))
            else
              echo "✓  $f"
            fi
          done
          if [ "$ERRORS" -gt 0 ]; then
            echo "❌ Migration syntax errors found — deploy blocked."
            exit 1
          fi
          echo "✓ All migration files OK."

      - name: E-Signatures feature test suite
        run: |
          echo "Running e-signatures CLI test suite..."
          php tests/test_esignatures_cli.php

      - name: Admin break-glass invariants (Phase 0.5)
        run: |
          echo "Running admin break-glass regression guard..."
          php tests/test_admin_breakglass_cli.php
      - name: Security coverage regression guard
        run: |
          echo "Running security coverage regression guard (Phase 0 of security_implementation_plan.md)..."
          php tests/test_security_coverage_cli.php

      - name: Verify deploy.yml has script_stop true
        run: |
          if grep -q "script_stop: true" .github/workflows/deploy.yml; then
            echo "✓ script_stop: true is set — failed migrations will halt deploy."
          else
            echo "❌ script_stop: true is missing from deploy.yml — deploy blocked."
            exit 1
          fi

  # ── JOB 2: DEPLOY ───────────────────────────────────────────────────────────
  # Only runs if test job passes. Blocked if any test step fails.
  deploy:
    name: Deploy to Production Servers
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            HOSTS=(
              mwpt.bjptechnologies.co.tz
              mufindipower.bjptechnologies.co.tz
              bms.bjptechnologies.co.tz
              demo.bjptechnologies.co.tz
              bejus.bjptechnologies.co.tz
            )
            UPLOAD_DIRS=(
              parties/customers
              parties/suppliers
              parties/sub_contractors
              system/backups
              hr/employees
              hr/leaves
              procurement/purchase_returns
              procurement/delivery_notes
              products
              projects/inspections
              projects/scopes
              projects/contracts
              projects/reports
              finance/grn
              finance/vouchers
              finance/purchase_orders
              finance/invoices
              finance/petty_cash
              finance/customer_lpos
              loans
              signatures
              documents
              document_library
              compliance
              inspections
              tenders/submissions
              tenders/evaluation
              tenders/awards
              petty_cash
              purchase_orders
            )
            for h in "${HOSTS[@]}"; do
              echo "────── Deploying to $h ──────"
              cd "/var/www/$h/public_html"
              git fetch origin main
              git reset --hard origin/main
              php migrations/runner.php
              for d in "${UPLOAD_DIRS[@]}"; do
                mkdir -p "uploads/$d" 2>/dev/null || true
              done
              chmod -R 777 uploads/ 2>/dev/null || true
            done

            echo "BMS deployed at $(date)"
            echo "Deploy check: OK"

            
